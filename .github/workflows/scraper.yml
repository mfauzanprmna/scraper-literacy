name: Weekly Scraper

on:
  workflow_dispatch:

  schedule:
    - cron: '0 0 * * 1'

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Scraper
        env:
          API_URL: ${{ secrets.LARAVEL_API_URL }}
          API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: |
          python scraper.py